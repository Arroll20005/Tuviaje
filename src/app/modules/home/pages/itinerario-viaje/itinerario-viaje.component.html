<div class="page">
    <div class="hero">
        <img src="/assets/images/guayaquil.jpg" alt="header">

        <div class="overlay">
            <img src="/assets/images/logoletras.svg" alt="logo">
        </div>
    </div>
    
    <div class="search-box">
        <div class="city">
            <label for="origen">Origen: </label>
            <select pInputText [(ngModel)]="ciudadOrigen" id="origen">
                <option value="" disabled selected>Selecciona origen</option>
                <option *ngFor="let ciudad of ciudades" [value]="ciudad">{{ciudad}}</option>
            </select>
        </div>

        <div class="swap">
            <i class="pi pi-arrow-right-arrow-left" (click)="intercambiar()" style="cursor: pointer;"></i>
        </div>

        <div class="city">
            <label for="destino">Destino: </label>
            <select pInputText [(ngModel)]="ciudadDestino" id="destino">
                <option value="" disabled selected>Selecciona destino</option>
                <option *ngFor="let ciudad of ciudades" [value]="ciudad">{{ciudad}}</option>
            </select>
        </div>

        <p-calendar [(ngModel)]="selectedDate" [showIcon]="true"></p-calendar>
    </div>

    <div>
        <p-card header="Itinerario de viaje" class="itinerary-card">
            <div class="card-content">
                <div class="time-info">
                    <div>
                        <span>Hora de salida: </span>
                        <time datetime="08:00">08:00</time>
                    </div>
                    <div>
                        <span>Hora de llegada: </span>
                        <time datetime="12:00">12:00</time>
                    </div>
                </div>

                <div class="timeline-container">
                    <dl class="timeline">
                        <div class="timeline-item origin">
                            <dt>Origen</dt>
                            <dd>Terminal Terrestre Portoviejo</dd>
                        </div>

                        <div class="timeline-item destination">
                            <dt>Destino</dt>
                            <dd>Terminal Terrestre de Quito Sur - Quitumbe</dd>
                        </div>
                    </dl>
                </div>
            </div>
        </p-card>
    </div>

    <div>
        <p-card styleClass="passenger-card">
            <div class="card-body">
                <div class="info-section">
                    <h3 class="title">Pasajeros:</h3>
                    <span class="subtitle">x pasajero</span>
                    <div class="price-box">
                        <span class="price">$ 14.00</span>
                        <span class="divider">/</span>
                        <span class="unit">Pasajero</span>
                    </div>
                </div>

                <div class="controls-section">
                    <div class="counter-row">
                        <div class="number-display">28</div>
                        <div class="stepper-buttons">
                            <button type="button" class="btn-step btn-plus" aria-label="Aumentar pasajeros">+</button>
                            <button type="button" class="btn-step btn-minus" aria-label="Disminuir pasajeros">−</button>
                        </div>
                    </div>

                    <div class="action-row text-right">
                        <i class="pi pi-bell-slash text-muted mr-2"></i> 
                        <button type="button" class="btn-cancel">cancelar</button>
                    </div>

                    <div class="action-row">
                        <a routerLink="/asientos" class="btn-submit" style="display: inline-block; text-align: center; text-decoration: none; cursor: pointer;">
                            <i class="pi pi-users"></i> Ver Asientos
                        </a>
                    </div>
                </div>
            </div>
        </p-card>
    </div>
</div>
